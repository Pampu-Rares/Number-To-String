<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Convert Number To Words</title>
    <link rel="stylesheet" href="Styles.css">
  </head>
  <body>

    <main>
        <h1>Convert Number To Words</h1>
        <div id="app-container">
            <details>
                <summary>What even is this?</summary>
                <ul>
                    <li>This is a site where you can enter any number you can think of.</li>
                    <li>After you press enter, the inputed number will appear bellow as in words.</li>
                    <li><strong>Attention:</strong> you must enter a number, or else it won't work.</li>
                </ul>
            </details>
            <input id="number-input" type="text" placeholder="Input your number here">
            <button id="enter-btn">Enter number</button>
        </div>
        <dialog id="result-modal">
            <p id="result"></p>
            <button id="close-modal">X</button>
        </dialog>
    </main>

    <script src="number-to-string.js"></script>
  </body>
</html>
